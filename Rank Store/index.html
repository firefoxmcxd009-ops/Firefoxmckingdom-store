  <link href="https://fonts.cdnfonts.com/css/a4-speed" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/esportiva" rel="stylesheet">

<body>
  <!-- =============== -->
  <!-- Background Blur -->
  <!-- =============== -->
   
   <div class="blur-item">
    <div class="blur"></div>
    <div class="blur"></div>
   </div>
   <div class="blur-background"></div>
   
  <div class="form" aria-required="true">
  <div class="box">
    <h1>Ranks Store</h1>
    <input class="name" type="text" id="username" placeholder="Minecraft Username" required><br><br>

  <div class="selection">
    <select name="rank" id="rank" onchange="changeRank()" required>
     <option value="VIP">VIP</option>
     <option value="MVP">MVP</option>
     <option value="MVP+">MVP+</option>
     <option value="EPIC">EPIC</option>
     <option value="KINGDOM">KINGDOM</option>
    </select>

    <label for="fileUpload" class="upload-btn">
      <p class="chooseFile">អាប់ឡូតវិកាយប័ត្រ</p>
    </label>
    <input type="file" name="receipt" accept="image/*"​ id="fileUpload" hidden required><br><br>
    <p id="fileName">មិនទាន់អាប់ឡូត</p>
  </div>

  <!-- QR CODE ABA PAYMENT -->
    <div class="qr-container">
      <div class="skeleton" id="qrSkeleton"></div>
      <img src="/static/qr_vip.png" id="qr" width="55%" onload="hideSkeleton()" onerror="showFallback()">
    </div>
    <p id="date"></p>

    <div class="submit">
      <button onclick="sendOrder()">Submit</button>
    </div>
  </div>
</div>
  <h2>
    if you wait for 24/7h did't have Rank, contact me on telegram:

  </h2>
<script src="/Rank Store/script.js"></script>
